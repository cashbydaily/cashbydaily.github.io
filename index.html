<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory</title>
<style>
  :root{
    --border:#e7e7e7;
    --text:#111;
    --muted:#666;
    --blue:#1877f2;
    --dark:#111;
    --bg:#fff;
    --card:#fff;
    --shadow:0 10px 28px rgba(0,0,0,.08);
    --radius:14px;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  header{
    padding:28px 20px;
    text-align:center;
    border-bottom:1px solid var(--border);
    background:#fff;
    position:sticky;
    top:0;
    z-index:5;
  }

  header h1{
    margin:0;
    font-size:42px;
    line-height:1.1;
    letter-spacing:.5px;
  }

  .controls{
    max-width:1500px;
    margin:20px auto 0;
    padding:0 20px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
  }

  .controls input,
  .controls select{
    height:46px;
    border:1px solid #cfcfcf;
    border-radius:10px;
    padding:0 14px;
    font-size:15px;
    background:#fff;
    color:#111;
    outline:none;
  }

  .controls input{
    flex:1 1 260px;
    min-width:240px;
  }

  .controls select{
    flex:0 0 220px;
  }

  .meta,
  .status-line{
    max-width:1500px;
    margin:10px auto 0;
    padding:0 20px;
    color:var(--muted);
    font-size:14px;
  }

  .status-line{
    min-height:20px;
  }

  .inventory{
    max-width:1500px;
    margin:18px auto 40px;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:20px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    transition:transform .16s ease, box-shadow .16s ease;
  }

  .card:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow);
  }

  .main-image{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
    background:#f5f5f5;
    cursor:pointer;
  }

  .thumbs{
    display:flex;
    gap:8px;
    padding:10px 12px 0;
    flex-wrap:wrap;
  }

  .thumb{
    width:56px;
    height:56px;
    border:1px solid #ddd;
    border-radius:10px;
    overflow:hidden;
    padding:0;
    background:#fff;
    cursor:pointer;
    flex:0 0 auto;
  }

  .thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .info{
    padding:14px 14px 16px;
  }

  .title{
    font-size:18px;
    font-weight:700;
    margin:0 0 8px;
    line-height:1.3;
  }

  .price{
    font-size:28px;
    font-weight:800;
    margin:0 0 8px;
  }

  .details{
    color:var(--muted);
    font-size:14px;
    line-height:1.5;
    margin-bottom:14px;
    min-height:42px;
  }

  .chips{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }

  .chip{
    font-size:12px;
    padding:6px 10px;
    border:1px solid #ddd;
    border-radius:999px;
    background:#fafafa;
    color:#333;
  }

  .status-chip.in-stock{
    background:#e7f7ea;
    color:#1f7a3f;
    border-color:#cfe9d3;
  }

  .status-chip.sold{
    background:#ffe5e5;
    color:#a30000;
    border-color:#f4caca;
  }

  .buttons{
    display:flex;
    gap:10px;
  }

  .btn{
    flex:1;
    text-decoration:none;
    text-align:center;
    padding:12px 10px;
    border-radius:10px;
    font-weight:700;
    font-size:14px;
    border:none;
    cursor:pointer;
  }

  .btn.primary{
    background:var(--blue);
    color:#fff;
  }

  .btn.secondary{
    background:var(--dark);
    color:#fff;
  }

  .empty,
  .error{
    grid-column:1/-1;
    padding:26px;
    border-radius:14px;
    text-align:center;
    background:#fff;
  }

  .empty{
    border:1px dashed #ccc;
    color:var(--muted);
  }

  .error{
    border:1px solid #f0c3c3;
    color:#8b1e1e;
    background:#fff6f6;
  }

  .modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.82);
    z-index:9999;
    justify-content:center;
    align-items:center;
    padding:20px;
  }

  .modal-panel{
    width:min(1100px, 100%);
    max-height:92vh;
    overflow:auto;
    background:#fff;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
    position:relative;
  }

  .modal-close{
    position:absolute;
    top:12px;
    right:16px;
    font-size:28px;
    line-height:1;
    border:none;
    background:transparent;
    cursor:pointer;
    color:#fff;
    z-index:2;
  }

  .gallery-close{
    color:#fff;
    position:fixed;
    top:16px;
    right:22px;
    z-index:10001;
    font-size:34px;
    cursor:pointer;
    user-select:none;
  }

  .gallery-wrap{
    width:min(1200px, 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    color:#fff;
  }

  .gallery-main{
    width:min(100%, 1100px);
    max-height:72vh;
    object-fit:contain;
    background:#111;
    border-radius:14px;
  }

  .gallery-controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .gallery-btn{
    border:none;
    background:#fff;
    color:#111;
    font-weight:700;
    border-radius:10px;
    padding:10px 14px;
    cursor:pointer;
  }

  .gallery-thumbs{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
    max-width:1100px;
  }

  .gallery-thumb{
    width:68px;
    height:68px;
    border:2px solid rgba(255,255,255,.22);
    background:#222;
    padding:0;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
  }

  .gallery-thumb.active{
    border-color:#fff;
  }

  .gallery-thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .details-grid{
    display:grid;
    grid-template-columns: 1.1fr .9fr;
    gap:20px;
    padding:22px;
  }

  .details-img{
    width:100%;
    height:420px;
    object-fit:cover;
    border-radius:14px;
    background:#f5f5f5;
    display:block;
  }

  .details-title{
    font-size:30px;
    font-weight:800;
    margin:0 0 10px;
  }

  .details-price{
    font-size:36px;
    font-weight:800;
    margin:0 0 12px;
  }

  .details-meta{
    color:#555;
    line-height:1.6;
    margin-bottom:16px;
    white-space:pre-line;
  }

  .details-thumb-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:14px;
  }

  .details-thumb{
    width:60px;
    height:60px;
    border:1px solid #ddd;
    border-radius:10px;
    overflow:hidden;
    padding:0;
    cursor:pointer;
    background:#fff;
  }

  .details-thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .details-actions{
    display:flex;
    gap:10px;
    margin-top:18px;
    flex-wrap:wrap;
  }

  .details-actions .btn{
    flex:0 0 auto;
    min-width:160px;
  }

  @media (max-width: 860px){
    .details-grid{
      grid-template-columns:1fr;
    }

    .details-img{
      height:320px;
    }
  }

  @media (max-width: 640px){
    header h1{ font-size:34px; }
    .controls select{ flex:1 1 220px; }
    .main-image{ height:200px; }
    .price{ font-size:25px; }
    .details-price{ font-size:30px; }
  }
</style>
</head>
<body>

<header>
  <h1>Inventory</h1>
</header>

<div class="controls">
  <input id="search" type="text" placeholder="Search inventory..." />

  <select id="typeFilter">
    <option value="">All Types</option>
    <option value="coupe">Coupe</option>
    <option value="sedan">Sedan</option>
    <option value="suv">SUV</option>
    <option value="truck">Truck</option>
    <option value="other">Other</option>
  </select>

  <select id="sort">
    <option value="yearNew">Year High → Low</option>
    <option value="yearOld">Year Low → High</option>
    <option value="priceLow">Price Low → High</option>
    <option value="priceHigh">Price High → Low</option>
    <option value="stockAz">Stock A → Z</option>
    <option value="stockZa">Stock Z → A</option>
  </select>
</div>

<div class="meta" id="meta">Loading inventory...</div>
<div class="status-line" id="statusLine"></div>
<div class="inventory" id="inventory"></div>

<div class="modal" id="galleryModal" aria-hidden="true">
  <div class="gallery-close" onclick="closeModal('galleryModal')">✕</div>
  <div class="gallery-wrap">
    <img id="galleryMainImg" class="gallery-main" src="" alt="Vehicle image" />
    <div class="gallery-controls">
      <button class="gallery-btn" onclick="prevGalleryImage()">Prev</button>
      <button class="gallery-btn" onclick="nextGalleryImage()">Next</button>
      <button class="gallery-btn" onclick="closeModal('galleryModal')">Close</button>
    </div>
    <div class="gallery-thumbs" id="galleryThumbs"></div>
  </div>
</div>

<div class="modal" id="detailsModal" aria-hidden="true">
  <div class="modal-panel">
    <button class="modal-close" onclick="closeModal('detailsModal')">×</button>
    <div id="detailsBody"></div>
  </div>
</div>

<script>
  const SHEET_ID = "1LGeq8OOEyDZUbEAKPsyOeMKIpBt2gRQGpFL22UZ3szI";
  const GID = 0;
  const SCHEDULE_URL = "https://www.cashbydaily.com/inquiry";

  const SHEET_URL =
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID}&headers=1&tqx=out:json;responseHandler:inventorySheetLoaded`;

  const PLACEHOLDER_IMAGE =
    "data:image/svg+xml;charset=UTF-8," +
    encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
        <rect width="1200" height="800" fill="#f3f3f3"/>
        <rect x="120" y="170" width="960" height="460" rx="30" fill="#e5e5e5"/>
        <text x="600" y="420" font-family="Arial, Helvetica, sans-serif" font-size="54" text-anchor="middle" fill="#888">
          No Photo Available
        </text>
      </svg>
    `);

  let vehicles = [];
  let visibleVehicles = [];
  let currentGalleryImages = [];
  let currentGalleryIndex = 0;
  let currentDetailsVehicle = null;

  const inventoryEl = document.getElementById("inventory");
  const metaEl = document.getElementById("meta");
  const statusEl = document.getElementById("statusLine");
  const searchEl = document.getElementById("search");
  const sortEl = document.getElementById("sort");
  const typeFilterEl = document.getElementById("typeFilter");
  const galleryModal = document.getElementById("galleryModal");
  const detailsModal = document.getElementById("detailsModal");
  const galleryMainImg = document.getElementById("galleryMainImg");
  const galleryThumbs = document.getElementById("galleryThumbs");
  const detailsBody = document.getElementById("detailsBody");

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function escapeJs(value) {
    return String(value ?? "")
      .replaceAll("\\", "\\\\")
      .replaceAll("'", "\\'");
  }

  function toNumber(value) {
    const n = Number(String(value ?? "").replace(/[^0-9.-]/g, ""));
    return Number.isFinite(n) ? n : 0;
  }

  function parseImages(description) {
    return String(description ?? "")
      .split(";")
      .map(s => s.trim())
      .filter(Boolean);
  }

  function normalizeText(v) {
    return String(v ?? "").trim();
  }

  function normalizeStatus(v) {
    return String(v ?? "")
      .toLowerCase()
      .trim()
      .replace(/[^a-z]/g, "");
  }

  function isInStock(status) {
    const s = normalizeStatus(status);
    return s === "instock" || s === "insock";
  }

  function isSold(status) {
    return normalizeStatus(status) === "sold";
  }

  function normalizeType(v) {
    return String(v ?? "").toLowerCase().trim();
  }

  function vehicleSort(a, b, mode) {
    const yearA = toNumber(a.year);
    const yearB = toNumber(b.year);
    const priceA = toNumber(a.price);
    const priceB = toNumber(b.price);
    const stockA = normalizeText(a.stock).toLowerCase();
    const stockB = normalizeText(b.stock).toLowerCase();

    switch (mode) {
      case "priceLow":
        return priceA - priceB;
      case "priceHigh":
        return priceB - priceA;
      case "yearOld":
        return yearA - yearB;
      case "yearNew":
        return yearB - yearA;
      case "stockAz":
        return stockA.localeCompare(stockB, undefined, { numeric: true, sensitivity: "base" });
      case "stockZa":
        return stockB.localeCompare(stockA, undefined, { numeric: true, sensitivity: "base" });
      default:
        return yearB - yearA;
    }
  }

  function setCardImage(cardId, imageUrl) {
    const img = document.getElementById(`main-img-${cardId}`);
    if (img && imageUrl) img.src = imageUrl;
  }

  function setGalleryImage(index) {
    if (!currentGalleryImages.length) return;
    currentGalleryIndex = ((index % currentGalleryImages.length) + currentGalleryImages.length) % currentGalleryImages.length;
    galleryMainImg.src = currentGalleryImages[currentGalleryIndex];

    const thumbs = [...galleryThumbs.querySelectorAll(".gallery-thumb")];
    thumbs.forEach((btn, i) => btn.classList.toggle("active", i === currentGalleryIndex));
  }

  function nextGalleryImage() {
    setGalleryImage(currentGalleryIndex + 1);
  }

  function prevGalleryImage() {
    setGalleryImage(currentGalleryIndex - 1);
  }

  function openGallery(vehicleIndex, startIndex = 0) {
    const vehicle = visibleVehicles[vehicleIndex];
    if (!vehicle) return;

    const images = vehicle.images.length ? vehicle.images : [PLACEHOLDER_IMAGE];
    currentGalleryImages = images;
    currentGalleryIndex = Math.max(0, Math.min(startIndex, images.length - 1));

    galleryThumbs.innerHTML = images.map((img, i) => `
      <button class="gallery-thumb ${i === currentGalleryIndex ? "active" : ""}" type="button" onclick="setGalleryImage(${i})">
        <img src="${escapeHtml(img)}" alt="Thumb ${i + 1}">
      </button>
    `).join("");

    setGalleryImage(currentGalleryIndex);
    galleryModal.style.display = "flex";
    galleryModal.setAttribute("aria-hidden", "false");
  }

  function openDetails(vehicleIndex) {
    const vehicle = visibleVehicles[vehicleIndex];
    if (!vehicle) return;

    currentDetailsVehicle = vehicle;
    const images = vehicle.images.length ? vehicle.images : [PLACEHOLDER_IMAGE];
    const mainImage = images[0] || PLACEHOLDER_IMAGE;
    const sold = isSold(vehicle.status);
    const inStock = isInStock(vehicle.status);
    const statusLabel = sold ? "SOLD" : (inStock ? "IN STOCK" : "IN STOCK");
    const statusClass = sold ? "sold" : "in-stock";

    const title = `${escapeHtml(vehicle.year)} ${escapeHtml(vehicle.make)} ${escapeHtml(vehicle.model)}`.trim();

    detailsBody.innerHTML = `
      <div class="details-grid">
        <div>
          <img
            id="detailsMainImage"
            class="details-img"
            src="${escapeHtml(mainImage)}"
            alt="${title}"
            onerror="this.src='${PLACEHOLDER_IMAGE}'"
            style="cursor:pointer"
            onclick="openGallery(${vehicleIndex}, 0)"
          >
          <div class="details-thumb-row">
            ${images.map((img, i) => `
              <button class="details-thumb" type="button" onclick="openGallery(${vehicleIndex}, ${i})">
                <img src="${escapeHtml(img)}" alt="Photo ${i + 1}">
              </button>
            `).join("")}
          </div>
        </div>

        <div>
          <div class="chips" style="margin-bottom:12px;">
            <span class="chip status-chip ${statusClass}">${statusLabel}</span>
            ${vehicle.type ? `<span class="chip">${escapeHtml(vehicle.type)}</span>` : ""}
          </div>

          <div class="details-title">${title}</div>
          <div class="details-price">$${Number(toNumber(vehicle.price)).toLocaleString()}</div>

          <div class="details-meta">
Type: ${escapeHtml(vehicle.type)}
Stock: ${escapeHtml(vehicle.stock)}
Status: ${escapeHtml(vehicle.status)}
          </div>

          <div class="details-actions">
            <a class="btn primary" href="${SCHEDULE_URL}" target="_blank" rel="noopener">Schedule</a>
            <button class="btn secondary" type="button" onclick="openGallery(${vehicleIndex}, 0)">Details</button>
          </div>
        </div>
      </div>
    `;

    detailsModal.style.display = "flex";
    detailsModal.setAttribute("aria-hidden", "false");
  }

  function closeModal(id) {
    const modal = document.getElementById(id);
    if (modal) {
      modal.style.display = "none";
      modal.setAttribute("aria-hidden", "true");
    }
  }

  function validateImageUrl(url, timeoutMs = 8000) {
    return new Promise(resolve => {
      if (!url) return resolve(null);

      const img = new Image();
      let settled = false;

      const done = value => {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        resolve(value);
      };

      const timer = setTimeout(() => done(null), timeoutMs);

      img.onload = () => done(url);
      img.onerror = () => done(null);
      img.referrerPolicy = "no-referrer";
      img.src = url;
    });
  }

  async function validateImages(urls) {
    const unique = [...new Set(urls.filter(Boolean))];
    const results = await Promise.all(unique.map(validateImageUrl));
    return results.filter(Boolean);
  }

  function render() {
    const query = searchEl.value.trim().toLowerCase();
    const sortMode = sortEl.value;
    const typeFilter = typeFilterEl.value.trim().toLowerCase();

    let list = [...vehicles];

    if (query || typeFilter) {
      list = list.filter(v => {
        const haystack = [
          v.year, v.make, v.model, v.type, v.price, v.stock, v.status
        ].join(" ").toLowerCase();

        const matchSearch = query ? haystack.includes(query) : true;
        const matchType = typeFilter ? normalizeType(v.type) === typeFilter : true;

        return matchSearch && matchType;
      });
    }

    list.sort((a, b) => vehicleSort(a, b, sortMode));
    visibleVehicles = list;

    metaEl.textContent = `${list.length} vehicle${list.length === 1 ? "" : "s"} found`;

    if (!list.length) {
      inventoryEl.innerHTML = `<div class="empty">No in-stock inventory found.</div>`;
      return;
    }

    inventoryEl.innerHTML = list.map((v, index) => {
      const images = v.images.length ? v.images : [PLACEHOLDER_IMAGE];
      const cardId = `${index}-${String(v.stock).replace(/[^a-z0-9_-]/gi, "") || "car"}`;
      const mainImage = escapeHtml(images[0]);
      const title = `${escapeHtml(v.year)} ${escapeHtml(v.make)} ${escapeHtml(v.model)}`.trim();
      const priceLine = Number(toNumber(v.price)).toLocaleString();
      const sold = isSold(v.status);
      const inStock = isInStock(v.status);
      const statusClass = sold ? "sold" : "in-stock";
      const statusLabel = sold ? "SOLD" : (inStock ? "IN STOCK" : "IN STOCK");

      return `
        <article class="card">
          <img
            id="main-img-${cardId}"
            class="main-image"
            src="${mainImage}"
            alt="${title}"
            onerror="this.src='${PLACEHOLDER_IMAGE}'"
            onclick="openGallery(${index}, 0)"
          >

          ${images.length > 1 ? `
            <div class="thumbs">
              ${images.slice(0, 6).map((img, i) => `
                <button class="thumb" type="button" onclick="setCardImage('${cardId}', '${escapeJs(img)}')">
                  <img src="${escapeHtml(img)}" alt="Photo ${i + 1}">
                </button>
              `).join("")}
            </div>
          ` : ""}

          <div class="info">
            <div class="chips">
              <span class="chip status-chip ${statusClass}">${statusLabel}</span>
              ${v.type ? `<span class="chip">${escapeHtml(v.type)}</span>` : ""}
            </div>

            <div class="title">${title}</div>
            <div class="price">$${priceLine}</div>

            <div class="details">
              ${escapeHtml(v.type)}<br>
              Stock: ${escapeHtml(v.stock)}
            </div>

            <div class="buttons">
              <a class="btn primary" href="${SCHEDULE_URL}" target="_blank" rel="noopener">Schedule</a>
              <button class="btn secondary" type="button" onclick="openDetails(${index})">Details</button>
            </div>
          </div>
        </article>
      `;
    }).join("");
  }

  function loadSheetViaScript() {
    statusEl.textContent = "Loading sheet...";

    const existing = document.getElementById("sheet-loader");
    if (existing) existing.remove();

    const script = document.createElement("script");
    script.id = "sheet-loader";
    script.async = true;
    script.src = `${SHEET_URL}&_=${Date.now()}`;

    script.onerror = () => {
      metaEl.textContent = "Could not load the sheet.";
      statusEl.textContent = "";
      inventoryEl.innerHTML = `
        <div class="error">
          The inventory did not load. Make sure the sheet is shared as <strong>Anyone with the link</strong> or <strong>Public on the web</strong>, and that row 1 contains:
          <br><br>
          Year | Make | Model | Type | Price | Stock | Status | Description
        </div>
      `;
    };

    document.body.appendChild(script);
  }

  window.inventorySheetLoaded = async function(data) {
    try {
      const rows = data?.table?.rows || [];

      vehicles = rows.map(row => ({
        year: normalizeText(row.c?.[0]?.v || ""),
        make: normalizeText(row.c?.[1]?.v || ""),
        model: normalizeText(row.c?.[2]?.v || ""),
        type: normalizeText(row.c?.[3]?.v || ""),
        price: normalizeText(row.c?.[4]?.v || ""),
        stock: normalizeText(row.c?.[5]?.v || ""),
        status: normalizeText(row.c?.[6]?.v || ""),
        images: parseImages(row.c?.[7]?.v || "")
      }));

      const total = vehicles.length;
      const inStockBeforeValidation = vehicles.filter(v => isInStock(v.status)).length;
      statusEl.textContent = `Loaded ${total} rows. In-stock rows detected: ${inStockBeforeValidation}. Validating images...`;

      vehicles = vehicles.filter(v => isInStock(v.status));

      for (let i = 0; i < vehicles.length; i++) {
        const cleaned = await validateImages(vehicles[i].images);
        vehicles[i].images = cleaned.length ? cleaned : [];
      }

      statusEl.textContent = `Loaded ${total} rows. Valid in-stock vehicles: ${vehicles.length}.`;
      render();
    } catch (err) {
      console.error(err);
      metaEl.textContent = "Inventory load error.";
      statusEl.textContent = "";
      inventoryEl.innerHTML = `<div class="error">The sheet loaded, but the data format did not match the expected columns.</div>`;
    }
  };

  searchEl.addEventListener("input", render);
  sortEl.addEventListener("change", render);
  typeFilterEl.addEventListener("change", render);

  galleryModal.addEventListener("click", e => {
    if (e.target === galleryModal) closeModal("galleryModal");
  });

  detailsModal.addEventListener("click", e => {
    if (e.target === detailsModal) closeModal("detailsModal");
  });

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      closeModal("galleryModal");
      closeModal("detailsModal");
    }
    if (e.key === "ArrowRight" && galleryModal.style.display === "flex") nextGalleryImage();
    if (e.key === "ArrowLeft" && galleryModal.style.display === "flex") prevGalleryImage();
  });

  window.openGallery = openGallery;
  window.openDetails = openDetails;
  window.closeModal = closeModal;
  window.nextGalleryImage = nextGalleryImage;
  window.prevGalleryImage = prevGalleryImage;
  window.setGalleryImage = setGalleryImage;
  window.setCardImage = setCardImage;

  loadSheetViaScript();
</script>
</body>
</html>
