<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #111;
  }

  header {
    padding: 22px;
    text-align: center;
    border-bottom: 1px solid #eee;
  }

  header h1 {
    margin: 0;
    font-size: 38px;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 18px;
    max-width: 1200px;
    margin: auto;
  }

  .controls input {
    flex: 1;
    min-width: 220px;
    height: 44px;
    padding: 0 12px;
    border: 1px solid #ddd;
    border-radius: 10px;
  }

  .search-btn {
    height: 44px;
    padding: 0 16px;
    border: none;
    border-radius: 10px;
    background: #111;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    padding: 18px;
    max-width: 1400px;
    margin: auto;
  }

  .card {
    border: 1px solid #eee;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    background: #fff;
  }

  .card:hover {
    box-shadow: 0 10px 25px rgba(0,0,0,.08);
  }

  .img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    background: #f3f3f3;
  }

  .content {
    padding: 12px;
  }

  .title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .price {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .meta {
    font-size: 13px;
    color: #666;
  }

  /* FULL SCREEN DETAILS */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 9999;
    overflow-y: auto;
  }

  .media {
    position: relative;
    background: #000;
    width: 100%;
    height: 45vh;
    min-height: 320px;
  }

  .media img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 26px;
    background: rgba(255,255,255,.95);
    z-index: 5;
  }

  .arrow.left { left: 12px; }
  .arrow.right { right: 12px; }

  .dots {
    position: absolute;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 6px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: none;
    background: #555;
  }

  .dot.active { background: #fff; }

  .info {
    padding: 16px;
    max-width: 1100px;
    margin: auto;
  }

  .titleBig {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .priceBig {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    font-size: 14px;
  }

  .btns {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-weight: 700;
    cursor: pointer;
  }

  .primary { background: #1877f2; color: #fff; }
  .dark { background: #111; color: #fff; }

  @media(max-width:700px){
    .grid2 { grid-template-columns: 1fr; }
    header h1 { font-size: 30px; }
  }
</style>
</head>

<body>

<header>
  <h1>Inventory</h1>
</header>

<div class="controls">
  <input id="search" placeholder="Search inventory..." />
  <button class="search-btn" onclick="render()">Search</button>
</div>

<div class="grid" id="grid"></div>

<!-- DETAILS -->
<div class="modal" id="modal">

  <div class="media">
    <button class="arrow left" onclick="prev()">‹</button>
    <button class="arrow right" onclick="next()">›</button>

    <div id="mediaBox"></div>
    <div class="dots" id="dots"></div>
  </div>

  <div class="info">
    <div class="titleBig" id="title"></div>
    <div class="priceBig" id="price"></div>

    <div class="grid2" id="infoGrid"></div>

    <div class="btns">
      <button class="btn primary" onclick="window.open(INQUIRY_URL,'_blank')">Schedule</button>
      <button class="btn dark" onclick="closeModal()">Close</button>
    </div>
  </div>

</div>

<script>
const SHEET_ID = "1LGeq8OOEyDZUbEAKPsyOeMKIpBt2gRQGpFL22UZ3szI";
const INQUIRY_URL = "https://www.cashbydaily.com/inquiry";
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?headers=1&tqx=out:json;responseHandler=loadData`;

let data = [];
let filtered = [];
let current = 0;
let mediaIndex = 0;

/* URL CONTROL */
function setURL(stock){
  if(stock){
    history.replaceState(null, "", `?stock=${stock}`);
  } else {
    history.replaceState(null, "", `/inventory`);
  }
}

function getStockFromURL(){
  return new URLSearchParams(window.location.search).get("stock") || "";
}

/* MEDIA */
function parseMedia(desc=""){
  return desc.split(";").map(x=>x.trim()).filter(Boolean);
}

/* LOAD */
function loadData(res){
  data = res.table.rows.map(r=>({
    year:r.c[0]?.v||"",
    make:r.c[1]?.v||"",
    model:r.c[2]?.v||"",
    type:r.c[3]?.v||"",
    price:r.c[4]?.v||"",
    stock:r.c[5]?.v||"",
    status:r.c[6]?.v||"",
    media:parseMedia(r.c[7]?.v||"")
  }));

  const stock = getStockFromURL();
  document.getElementById("search").value = stock;

  render();

  if(stock){
    const idx = data.findIndex(v => v.stock.toLowerCase() === stock.toLowerCase());
    if(idx !== -1) openDetailsByData(idx);
  }
}

/* RENDER LIST */
function render(){
  const q = document.getElementById("search").value.toLowerCase();

  filtered = data.filter(v =>
    (v.year+v.make+v.model+v.stock).toLowerCase().includes(q)
  );

  document.getElementById("grid").innerHTML =
  filtered.map((v,i)=>`
    <div class="card" onclick="openDetails(${i})">
      <img class="img" src="${v.media[0] || ''}" />
      <div class="content">
        <div class="title">${v.year} ${v.make} ${v.model}</div>
        <div class="price">$${v.price}</div>
        <div class="meta">${v.stock}</div>
      </div>
    </div>
  `).join("");
}

/* DETAILS */
function openDetails(i){
  openDetailsByData(i);
}

function openDetailsByData(i){
  current = i;
  mediaIndex = 0;

  const v = filtered[i];

  document.getElementById("modal").style.display = "block";

  document.getElementById("title").innerText =
    `${v.year} ${v.make} ${v.model}`;

  document.getElementById("price").innerText =
    `$${v.price}`;

  document.getElementById("infoGrid").innerHTML = `
    <div>Stock<br>${v.stock}</div>
    <div>Type<br>${v.type}</div>
    <div>Status<br>${v.status}</div>
  `;

  setURL(v.stock);
  renderMedia();
}

/* MEDIA SLIDER */
function renderMedia(){
  const v = filtered[current];

  document.getElementById("mediaBox").innerHTML =
    `<img src="${v.media[mediaIndex]}" />`;

  document.getElementById("dots").innerHTML =
    v.media.map((_,i)=>`
      <button class="dot ${i===mediaIndex?'active':''}" onclick="setMedia(${i})"></button>
    `).join("");
}

function setMedia(i){ mediaIndex=i; renderMedia(); }
function next(){
  const v = filtered[current];
  mediaIndex = (mediaIndex+1) % v.media.length;
  renderMedia();
}
function prev(){
  const v = filtered[current];
  mediaIndex = (mediaIndex-1+v.media.length) % v.media.length;
  renderMedia();
}

/* CLOSE */
function closeModal(){
  document.getElementById("modal").style.display = "none";
  setURL(null);
}

/* LOAD SHEET */
const script = document.createElement("script");
script.src = URL;
document.body.appendChild(script);
</script>

</body>
</html>
