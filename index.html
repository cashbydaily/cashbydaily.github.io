<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial;
    background: #fff;
  }

  header {
    padding: 22px;
    text-align: center;
    border-bottom: 1px solid #eee;
  }

  header h1 { margin: 0; font-size: 36px; }

  .controls {
    display: flex;
    gap: 10px;
    padding: 16px;
    flex-wrap: wrap;
    max-width: 1200px;
    margin: auto;
  }

  input {
    flex: 1;
    min-width: 200px;
    height: 42px;
    padding: 0 12px;
    border: 1px solid #ddd;
    border-radius: 10px;
  }

  button {
    height: 42px;
    padding: 0 14px;
    border: none;
    border-radius: 10px;
    background: #111;
    color: #fff;
    font-weight: 700;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    padding: 16px;
    max-width: 1400px;
    margin: auto;
  }

  .card {
    border: 1px solid #eee;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
  }

  .card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    background: #f3f3f3;
  }

  .content {
    padding: 12px;
  }

  .title { font-weight: 700; font-size: 18px; }
  .price { font-weight: 800; font-size: 20px; margin-top: 4px; }
  .meta { font-size: 13px; color: #666; margin-top: 4px; }

  /* MODAL FULL SCREEN (stable) */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 9999;
    overflow-y: auto;
  }

  .media {
    position: relative;
    background: #000;
    height: 45vh;
    min-height: 320px;
  }

  .media img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,.95);
    font-size: 24px;
    cursor: pointer;
  }

  .left { left: 10px; }
  .right { right: 10px; }

  .dots {
    position: absolute;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 6px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #666;
    border: none;
  }

  .dot.active { background: #fff; }

  .info {
    padding: 16px;
    max-width: 1100px;
    margin: auto;
  }

  .bigTitle { font-size: 22px; font-weight: 800; }
  .bigPrice { font-size: 20px; font-weight: 800; margin: 6px 0 14px; }

  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    font-size: 14px;
  }

  .btns {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: 700;
  }

  .primary { background: #1877f2; color: #fff; }
  .dark { background: #111; color: #fff; }
</style>
</head>

<body>

<header>
  <h1>Inventory</h1>
</header>

<div class="controls">
  <input id="search" placeholder="Search stock / make / model..." />
  <button onclick="render()">Search</button>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="media">
    <button class="arrow left" onclick="prev()">‹</button>
    <button class="arrow right" onclick="next()">›</button>

    <div id="mediaBox"></div>
    <div class="dots" id="dots"></div>
  </div>

  <div class="info">
    <div class="bigTitle" id="title"></div>
    <div class="bigPrice" id="price"></div>

    <div class="grid2" id="info"></div>

    <div class="btns">
      <button class="btn primary" onclick="window.open(INQUIRY,'_blank')">Schedule</button>
      <button class="btn dark" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
const SHEET = "1LGeq8OOEyDZUbEAKPsyOeMKIpBt2gRQGpFL22UZ3szI";
const INQUIRY = "https://www.cashbydaily.com/inquiry";
const URL = `https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?headers=1&tqx=out:json;responseHandler=loadData`;

let data = [];
let filtered = [];
let current = 0;
let mediaIndex = 0;

/* SAFE PARSER */
function parseMedia(str=""){
  return str.split(";").map(x=>x.trim()).filter(Boolean);
}

/* GOOGLE CALLBACK (MUST BE GLOBAL) */
function loadData(res){
  data = res.table.rows.map(r=>({
    year:r.c[0]?.v||"",
    make:r.c[1]?.v||"",
    model:r.c[2]?.v||"",
    type:r.c[3]?.v||"",
    price:r.c[4]?.v||"",
    stock:r.c[5]?.v||"",
    status:r.c[6]?.v||"",
    media:parseMedia(r.c[7]?.v||"")
  }));

  render();

  const stock = new URLSearchParams(location.search).get("stock");
  if(stock){
    document.getElementById("search").value = stock;
    render();
  }
}

/* RENDER GRID */
function render(){
  const q = document.getElementById("search").value.toLowerCase();

  filtered = data.filter(v =>
    (v.stock+v.make+v.model+v.year).toLowerCase().includes(q)
  );

  document.getElementById("grid").innerHTML =
  filtered.map((v,i)=>`
    <div class="card" onclick="openDetails(${i})">
      <img src="${v.media[0]||''}">
      <div class="content">
        <div class="title">${v.year} ${v.make} ${v.model}</div>
        <div class="price">$${v.price}</div>
        <div class="meta">${v.stock}</div>
      </div>
    </div>
  `).join("");
}

/* OPEN */
function openDetails(i){
  current = i;
  mediaIndex = 0;

  const v = filtered[i];

  document.getElementById("modal").style.display="block";

  document.getElementById("title").innerText =
    `${v.year} ${v.make} ${v.model}`;

  document.getElementById("price").innerText =
    `$${v.price}`;

  document.getElementById("info").innerHTML = `
    <div>Stock<br>${v.stock}</div>
    <div>Type<br>${v.type}</div>
    <div>Status<br>${v.status}</div>
  `;

  history.replaceState(null,"",`?stock=${v.stock}`);

  renderMedia();
}

/* MEDIA */
function renderMedia(){
  const v = filtered[current];

  document.getElementById("mediaBox").innerHTML =
    `<img src="${v.media[mediaIndex]}">`;

  document.getElementById("dots").innerHTML =
    v.media.map((_,i)=>`
      <button class="dot ${i===mediaIndex?'active':''}" onclick="mediaIndex=${i};renderMedia()"></button>
    `).join("");
}

function next(){
  const v = filtered[current];
  mediaIndex = (mediaIndex+1)%v.media.length;
  renderMedia();
}

function prev(){
  const v = filtered[current];
  mediaIndex = (mediaIndex-1+v.media.length)%v.media.length;
  renderMedia();
}

/* CLOSE */
function closeModal(){
  document.getElementById("modal").style.display="none";
  history.replaceState(null,"",location.pathname);
}

/* LOAD SHEET */
const s=document.createElement("script");
s.src=URL;
document.body.appendChild(s);
</script>

</body>
</html>
